<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 
      aesthetic_dna: Premium Institutional Fintech, Dark Mode
      ui_paradigm: Data-Spatial Asymmetrical Split Hero 
      palette: Obsidian (#131318), Trade Green (#00E599), Error Red (#FF3B30), Electric Blue (#00E1FF), Pristine White 
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WickCoach - Master Your Trading Psychology</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: '#131318',
                        surface: '#1A1A24',
                        brandGreen: '#00E599',
                        brandRed: '#FF3B30',
                        brandBlue: '#00E1FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    backgroundImage: {
                        'radial-glow': 'radial-gradient(circle, var(--tw-gradient-stops))',
                    }
                }
            }
        }
    </script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            background-color: #131318;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 
         * Complex Keyframes for Volatility -> Breathing transition
         */
        @keyframes chartEntrance {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            15% { opacity: 1; transform: translateY(-10px) scale(1.02); }
            30% { transform: translateY(5px) scale(0.99); }
            45% { transform: translateY(-2px) scale(1.005); }
            60% { transform: translateY(1px) scale(0.998); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes breatheGlow {
            0%, 100% { opacity: 0.12; transform: scale(1) translate(-50%, -50%); }
            50% { opacity: 0.25; transform: scale(1.15) translate(-45%, -45%); }
        }

        @keyframes drawLine {
            from { stroke-dashoffset: 100; }
            to { stroke-dashoffset: 0; }
        }

        @keyframes floatLabel {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        @keyframes liveCandleHeight {
            0%, 100% { height: 15px; y: 60px; }
            20% { height: 28px; y: 47px; }
            40% { height: 10px; y: 65px; }
            80% { height: 18px; y: 57px; }
        }

        @keyframes liveCandleWick {
            0%, 100% { y1: 45px; }
            20% { y1: 30px; }
            40% { y1: 45px; }
            80% { y1: 35px; }
        }

        /* Utility Classes for Animations */
        .animate-chart-entrance {
            animation: chartEntrance 1.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }
        
        .animate-breathe-glow {
            animation: breatheGlow 8s ease-in-out infinite alternate;
        }

        .animate-draw-line {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawLine 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 1.2s; /* Start after entrance settles */
        }

        .float-label-delay-1 { animation: floatLabel 4s ease-in-out infinite alternate; animation-delay: 0s; }
        .float-label-delay-2 { animation: floatLabel 4s ease-in-out infinite alternate; animation-delay: 1s; }
        .float-label-delay-3 { animation: floatLabel 4s ease-in-out infinite alternate; animation-delay: 2s; }
        .float-label-delay-4 { animation: floatLabel 4s ease-in-out infinite alternate; animation-delay: 3s; }

        .live-rect { animation: liveCandleHeight 4s ease-in-out infinite; }
        .live-wick { animation: liveCandleWick 4s ease-in-out infinite; }

        /* Custom Scrollbar for absolute edge cases */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #131318; }
        ::-webkit-scrollbar-thumb { background: #2A2A35; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3A3A48; }

        /* Glow utilities */
        .text-glow-green { text-shadow: 0 0 20px rgba(0, 229, 153, 0.6); }
        .box-shadow-green { box-shadow: 0 0 40px rgba(0, 229, 153, 0.2); }
    </style>
</head>
